<!DOCTYPE html>
<html>
<head>
<title>Tuner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  #note { font-size: 96px; font-weight: 700; letter-spacing: -2px; }
  #cents { font-size: 32px; margin-top: 8px; font-variant-numeric: tabular-nums; }
  #freq { font-size: 18px; color: #888; margin-top: 4px; font-variant-numeric: tabular-nums; }

  #meter { width: 320px; height: 24px; margin-top: 32px; position: relative; background: #2a2a3e; border-radius: 12px; overflow: hidden; }
  #meter-bar { position: absolute; top: 0; height: 100%; width: 6px; background: #4ecca3; border-radius: 3px; transition: left 0.1s, background 0.1s; }
  #meter-center { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: #555; transform: translateX(-1px); }

  #strings { display: flex; gap: 12px; margin-top: 40px; }
  .string-btn { background: #2a2a3e; border: 2px solid #3a3a5e; color: #ccc; font-size: 18px; font-weight: 600; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; transition: all 0.15s; }
  .string-btn:hover { border-color: #4ecca3; }
  .string-btn.active { border-color: #4ecca3; background: #4ecca322; color: #4ecca3; }
  .string-btn.in-tune { border-color: #4ecca3; background: #4ecca3; color: #1a1a2e; }

  #tuning-bar { display: flex; align-items: center; gap: 12px; margin-top: 24px; }
  #tuning-select { background: #2a2a3e; border: 1px solid #3a3a5e; color: #ccc; font-size: 14px; padding: 6px 10px; border-radius: 6px; }
  #custom-btn { background: none; border: 1px solid #3a3a5e; color: #888; font-size: 13px; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
  #custom-btn:hover { border-color: #4ecca3; color: #ccc; }

  #custom-panel { display: none; margin-top: 16px; background: #2a2a3e; padding: 16px; border-radius: 8px; }
  #custom-panel.open { display: block; }
  #custom-panel input { background: #1a1a2e; border: 1px solid #3a3a5e; color: #e0e0e0; padding: 4px 8px; width: 60px; border-radius: 4px; font-size: 14px; text-align: center; }
  #custom-panel label { font-size: 13px; color: #888; margin-right: 4px; }
  .custom-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .custom-row > div { display: flex; align-items: center; gap: 4px; }
  #custom-apply { margin-top: 12px; background: #4ecca3; border: none; color: #1a1a2e; font-weight: 600; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }

  #start-btn { font-size: 20px; padding: 12px 32px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  #start-btn:hover { background: #3dbb92; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="start-screen">
  <button id="start-btn">Start Tuner</button>
</div>

<div id="tuner-screen" class="hidden">
  <div id="note">--</div>
  <div id="cents"></div>
  <div id="freq">-- Hz</div>

  <div id="meter">
    <div id="meter-center"></div>
    <div id="meter-bar" style="left:50%"></div>
  </div>

  <div id="strings"></div>

  <div id="tuning-bar">
    <select id="tuning-select"></select>
    <button id="custom-btn">Custom</button>
  </div>

  <div id="custom-panel">
    <div class="custom-row" id="custom-inputs"></div>
    <button id="custom-apply">Apply</button>
  </div>
</div>

<script>
const TUNINGS = {
  "Standard":       ["E2","A2","D3","G3","B3","E4"],
  "Drop D":         ["D2","A2","D3","G3","B3","E4"],
  "DADGAD":         ["D2","A2","D3","G3","A3","D4"],
  "Open G":         ["D2","G2","D3","G3","B3","D4"],
  "Open D":         ["D2","A2","D3","F#3","A3","D4"],
  "Half Step Down": ["Eb2","Ab2","Db3","Gb3","Bb3","Eb4"],
  "Drop C":         ["C2","G2","C3","F3","A3","D4"],
};

const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const ENHARMONIC = {"Db":"C#","Eb":"D#","Fb":"E","Gb":"F#","Ab":"G#","Bb":"A#","Cb":"B","E#":"F","B#":"C"};

function noteToFreq(note) {
  let name = note.replace(/[0-9]/g, "");
  const octave = parseInt(note.match(/\d+/)[0]);
  if (ENHARMONIC[name]) name = ENHARMONIC[name];
  const semitone = NOTE_NAMES.indexOf(name);
  if (semitone === -1) return 0;
  const midi = semitone + (octave + 1) * 12;
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function freqToNote(freq) {
  const midi = 12 * Math.log2(freq / 440) + 69;
  const rounded = Math.round(midi);
  const cents = Math.round((midi - rounded) * 100);
  const name = NOTE_NAMES[((rounded % 12) + 12) % 12];
  const octave = Math.floor(rounded / 12) - 1;
  return { name, octave, cents, midi: rounded };
}

let tuning = TUNINGS["Standard"].map(n => ({ note: n, freq: noteToFreq(n) }));
let activeString = -1; // -1 = auto-detect

// UI setup
const tuningSelect = document.getElementById("tuning-select");
for (const name of Object.keys(TUNINGS)) {
  const opt = document.createElement("option");
  opt.value = name;
  opt.textContent = name;
  tuningSelect.appendChild(opt);
}

function setTuning(notes) {
  tuning = notes.map(n => ({ note: n, freq: noteToFreq(n) }));
  activeString = -1;
  renderStrings();
}

tuningSelect.onchange = () => {
  setTuning(TUNINGS[tuningSelect.value]);
  document.getElementById("custom-panel").classList.remove("open");
};

document.getElementById("custom-btn").onclick = () => {
  const panel = document.getElementById("custom-panel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) renderCustomInputs();
};

function renderCustomInputs() {
  const container = document.getElementById("custom-inputs");
  container.innerHTML = "";
  tuning.forEach((s, i) => {
    const div = document.createElement("div");
    div.innerHTML = `<label>${i+1}</label><input value="${s.note}" data-idx="${i}">`;
    container.appendChild(div);
  });
}

document.getElementById("custom-apply").onclick = () => {
  const inputs = document.querySelectorAll("#custom-inputs input");
  const notes = [...inputs].map(inp => inp.value.trim());
  if (notes.every(n => noteToFreq(n) > 0)) {
    tuningSelect.value = "";
    setTuning(notes);
    document.getElementById("custom-panel").classList.remove("open");
  }
};

function renderStrings() {
  const container = document.getElementById("strings");
  container.innerHTML = "";
  tuning.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "string-btn";
    btn.textContent = s.note.replace(/[0-9]/g, "");
    btn.onclick = () => { activeString = activeString === i ? -1 : i; renderStrings(); };
    if (activeString === i) btn.classList.add("active");
    container.appendChild(btn);
  });
}
renderStrings();

// Pitch detection
function fft(re, im) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) { [re[i], re[j]] = [re[j], re[i]]; [im[i], im[j]] = [im[j], im[i]]; }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const half = len >> 1, angle = -2 * Math.PI / len;
    const wRe = Math.cos(angle), wIm = Math.sin(angle);
    for (let i = 0; i < n; i += len) {
      let curRe = 1, curIm = 0;
      for (let j = 0; j < half; j++) {
        const tRe = curRe * re[i+j+half] - curIm * im[i+j+half];
        const tIm = curRe * im[i+j+half] + curIm * re[i+j+half];
        re[i+j+half] = re[i+j] - tRe; im[i+j+half] = im[i+j] - tIm;
        re[i+j] += tRe; im[i+j] += tIm;
        const nr = curRe * wRe - curIm * wIm; curIm = curRe * wIm + curIm * wRe; curRe = nr;
      }
    }
  }
}

function detectPitch(samples, sampleRate) {
  const size = samples.length;
  let rms = 0;
  for (let i = 0; i < size; i++) rms += samples[i] * samples[i];
  rms = Math.sqrt(rms / size);
  if (rms < 0.010) return -1;

  let n = 1;
  while (n < size) n <<= 1;
  const re = new Float32Array(n), im = new Float32Array(n);
  for (let i = 0; i < size; i++) re[i] = samples[i] * (0.5 - 0.5 * Math.cos(2 * Math.PI * i / (size - 1)));
  fft(re, im);
  const mag = new Float32Array(n / 2);
  for (let i = 0; i < n / 2; i++) mag[i] = re[i] * re[i] + im[i] * im[i];

  const binWidth = sampleRate / n;
  const minBin = Math.floor(50 / binWidth), maxBin = Math.ceil(1400 / binWidth);
  const minLag = Math.floor(sampleRate / 1400);
  const maxLag = Math.min(Math.ceil(sampleRate / 50), Math.floor(size / 2));

  const nsdf = new Float32Array(maxLag + 1);
  for (let tau = minLag; tau <= maxLag; tau++) {
    let acf = 0, m = 0;
    for (let j = 0; j < size - tau; j++) { acf += samples[j] * samples[j + tau]; m += samples[j] * samples[j] + samples[j + tau] * samples[j + tau]; }
    nsdf[tau] = m > 0 ? 2 * acf / m : 0;
  }

  const peaks = [];
  for (let i = minLag + 1; i < maxLag; i++) {
    if (nsdf[i] > 0 && nsdf[i] >= nsdf[i-1] && nsdf[i] >= nsdf[i+1]) peaks.push({ pos: i, val: nsdf[i] });
  }
  if (peaks.length === 0) return -1;
  const globalMax = Math.max(...peaks.map(p => p.val));
  if (globalMax < 0.5) return -1;

  const best = peaks.reduce((a, b) => a.val > b.val ? a : b);
  peaks.sort((a, b) => a.pos - b.pos);
  let chosen = best;
  for (const p of peaks) {
    if (p.pos >= best.pos) break;
    if (p.val < best.val * 0.90) continue;
    if (Math.abs(best.pos / p.pos - 2) < 0.05) { chosen = p; break; }
  }

  {
    const hps = new Float32Array(n / 2);
    for (let i = 0; i < n / 2; i++) hps[i] = mag[i];
    for (let h = 2; h <= 6; h++) { for (let i = 0; i < Math.floor(n / 2 / h); i++) hps[i] *= mag[i * h]; }
    let hpsBin = minBin, hpsVal = hps[minBin];
    for (let i = minBin + 1; i <= maxBin; i++) { if (hps[i] > hpsVal) { hpsVal = hps[i]; hpsBin = i; } }
    const hpsFreq = hpsBin * binWidth;
    const candidates = peaks.filter(p => p.val >= globalMax * 0.70);
    let bestErr = Infinity;
    for (const p of candidates) { const err = Math.abs(sampleRate / p.pos - hpsFreq) / hpsFreq; if (err < bestErr) { bestErr = err; chosen = p; } }
  }

  const mp = chosen.pos;
  if (mp < 1 || mp >= maxLag) return -1;
  const a = nsdf[mp - 1], b = nsdf[mp], cc = nsdf[mp + 1], denom = a - 2 * b + cc;
  if (denom === 0) return sampleRate / mp;
  return sampleRate / (mp + (a - cc) / (2 * denom));
}

// Display
const noteEl = document.getElementById("note");
const centsEl = document.getElementById("cents");
const freqEl = document.getElementById("freq");
const meterBar = document.getElementById("meter-bar");

function updateDisplay(freq) {
  if (freq === -1) {
    noteEl.textContent = "--";
    centsEl.textContent = "";
    freqEl.textContent = "-- Hz";
    meterBar.style.left = "50%";
    meterBar.style.background = "#4ecca3";
    // clear in-tune highlights
    document.querySelectorAll(".string-btn").forEach(b => b.classList.remove("in-tune"));
    return;
  }

  // Find closest string
  let closestIdx = 0, closestDist = Infinity;
  for (let i = 0; i < tuning.length; i++) {
    const dist = Math.abs(1200 * Math.log2(freq / tuning[i].freq));
    if (activeString === -1 ? dist < closestDist : i === activeString) {
      closestDist = dist; closestIdx = i;
    }
  }
  if (activeString !== -1) closestDist = Math.abs(1200 * Math.log2(freq / tuning[activeString].freq));

  const target = tuning[closestIdx];
  const cents = 1200 * Math.log2(freq / target.freq);
  const clampedCents = Math.max(-50, Math.min(50, cents));
  const inTune = Math.abs(cents) < 5;

  noteEl.textContent = target.note.replace(/[0-9]/g, "");
  noteEl.style.color = inTune ? "#4ecca3" : Math.abs(cents) < 15 ? "#e0e0e0" : "#e74c3c";
  centsEl.textContent = cents >= 0 ? `+${cents.toFixed(0)}c` : `${cents.toFixed(0)}c`;
  centsEl.style.color = inTune ? "#4ecca3" : "#888";
  freqEl.textContent = freq.toFixed(1) + " Hz";

  const pct = 50 + (clampedCents / 50) * 50;
  meterBar.style.left = pct + "%";
  meterBar.style.background = inTune ? "#4ecca3" : Math.abs(cents) < 15 ? "#f0c040" : "#e74c3c";

  document.querySelectorAll(".string-btn").forEach((btn, i) => {
    btn.classList.toggle("in-tune", i === closestIdx && inTune);
  });
}

// Audio setup
document.getElementById("start-btn").onclick = async () => {
  document.getElementById("start-screen").classList.add("hidden");
  document.getElementById("tuner-screen").classList.remove("hidden");

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);
  const processor = ctx.createScriptProcessor(16384, 1, 1);

  processor.onaudioprocess = (e) => {
    const freq = detectPitch(e.inputBuffer.getChannelData(0), ctx.sampleRate);
    updateDisplay(freq);
  };

  src.connect(processor);
  processor.connect(ctx.destination);
};
</script>
</body>
</html>
